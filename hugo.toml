baseURL = "https://dermaprotocol.org"
languageCode = "en-us"
title = "DermaProtocol"

[pagination]
  pagerSize = 20

summaryLength = 40

enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  description = "Practical decision support for skincare, supplements, and nutrition. Build smarter routines without the hype."
  tagline = "Skincare and supplement decisions, simplified."
  author = "DermaProtocol"
  ogimage = "/images/og-default.png"

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    name = "Routine Builder"
    url = "/routine-builder/"
    weight = 1
  [[menu.main]]
    name = "Ingredients"
    url = "/ingredients/"
    weight = 2
  [[menu.main]]
    name = "Supplements"
    url = "/supplements/"
    weight = 3
  [[menu.main]]
    name = "Comparisons"
    url = "/comparisons/"
    weight = 4
  [[menu.main]]
    name = "Stack Checker"
    url = "/stack-checker/"
    weight = 5
  [[menu.main]]
    name = "Protocols"
    url = "/protocols/"
    weight = 6
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 7
  [[menu.main]]
    name = "Methodology"
    url = "/methodology/"
    weight = 8
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 9

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]
