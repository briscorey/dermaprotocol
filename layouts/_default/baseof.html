<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/dp.css">
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "nav.html" . }}
  <main>{{ block "main" . }}{{ end }}</main>
  {{ partial "footer.html" . }}
  <script>
    var ro=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');ro.unobserve(e.target);}});},{threshold:0.1,rootMargin:'0px 0px -30px 0px'});
    document.querySelectorAll('.reveal').forEach(function(el){ro.observe(el);});
    var burger=document.getElementById('burger'),mob=document.getElementById('mobileNav');
    if(burger&&mob){burger.addEventListener('click',function(){var o=mob.classList.toggle('active');burger.setAttribute('aria-expanded',o);});mob.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){mob.classList.remove('active');burger.setAttribute('aria-expanded','false');});});}
  </script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
